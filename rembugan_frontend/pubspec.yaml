name: rembugan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  fluentui_system_icons: ^1.1.273
  forui: ^0.21.3
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/img/
    - lib/assets/icons/
    - lib/assets/fonts/
    - lib/assets/animations/

  fonts:
    - family: Satoshi
      fonts:
        - asset: lib/assets/fonts/GeneralSans-Extralight.otf
          weight: 200
        - asset: lib/assets/fonts/GeneralSans-Light.otf
          weight: 300
        - asset: lib/assets/fonts/GeneralSans-Regular.otf
          weight: 400
        - asset: lib/assets/fonts/GeneralSans-Medium.otf
          weight: 500
        - asset: lib/assets/fonts/GeneralSans-Semibold.otf
          weight: 600
        - asset: lib/assets/fonts/GeneralSans-Bold.otf
          weight: 700
    - family: Inter
      fonts:
        - asset: lib/assets/fonts/Inter.ttf
