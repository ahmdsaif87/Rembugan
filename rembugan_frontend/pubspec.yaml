name: rembugan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  fluentui_system_icons: ^1.1.273
  forui: ^0.21.3
  lottie: ^3.3.3
  dio: ^5.8.0
  flutter_secure_storage: ^9.2.4
  pretty_dio_logger: ^1.4.0
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  http: ^1.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.1
  web_socket_channel: ^3.0.0
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.5
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - lib/assets/img/
    - lib/assets/icons/
    - lib/assets/fonts/
    - lib/assets/animations/

  fonts:
    - family: Satoshi
      fonts:
        - asset: lib/assets/fonts/GeneralSans-Extralight.otf
          weight: 200
        - asset: lib/assets/fonts/GeneralSans-Light.otf
          weight: 300
        - asset: lib/assets/fonts/GeneralSans-Regular.otf
          weight: 400
        - asset: lib/assets/fonts/GeneralSans-Medium.otf
          weight: 500
        - asset: lib/assets/fonts/GeneralSans-Semibold.otf
          weight: 600
        - asset: lib/assets/fonts/GeneralSans-Bold.otf
          weight: 700
    - family: Inter
      fonts:
        - asset: lib/assets/fonts/Inter.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/img/logo_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/assets/img/logo_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
