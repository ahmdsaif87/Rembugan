services:
  redis:
    image: redis:7-alpine
    container_name: rembugan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./rembugan-backend
    container_name: rembugan-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./rembugan-backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./rembugan-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    image: node:20-alpine
    container_name: rembugan-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    env_file:
      - ./rembugan-dashboard/.env.local
    depends_on:
      - backend
    volumes:
      - ./rembugan-dashboard:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  redis_data:
  huggingface_cache:
